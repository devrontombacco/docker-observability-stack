services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/tickets
    depends_on:
      - db
    networks:
      - tickets-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=tickets
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tickets-network

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - tickets-network

volumes:
  postgres-data:

networks:
  tickets-network:
    driver: bridge